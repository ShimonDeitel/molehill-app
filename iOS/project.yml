name: Molehill
options:
  bundleIdPrefix: com.shimondeitel.molehill
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Molehill:
    type: application
    platform: iOS
    sources:
      - path: Molehill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.molehill
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Molehill/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MolehillTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MolehillTests
      - path: Molehill.storekit
    dependencies:
      - target: Molehill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.molehill.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MolehillUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MolehillUITests
    dependencies:
      - target: Molehill
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.molehill.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Molehill:
    build:
      targets:
        Molehill: all
        MolehillTests: [test]
        MolehillUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Molehill.storekit
    test:
      config: Debug
      storeKitConfiguration: Molehill.storekit
      targets:
        - MolehillTests
        - MolehillUITests
    archive:
      config: Release
